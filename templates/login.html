{% extends "base.html" %}

{% block title %}Вход - Wanderleaf Teas{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/auth.css">
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="container">
        <div class="auth-container">
            <h1>Вход</h1>
            <p class="auth-subtitle">Войдите в свой аккаунт</p>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <div class="form-error" id="errorMessage" style="display: none;"></div>
                
                <button type="submit" class="btn btn-primary btn-block">Войти</button>
            </form>
            
            <p class="auth-footer">
                Нет аккаунта? <a href="/register" id="registerLink">Зарегистрируйтесь</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/js/login.js"></script>
<script>
// Передаем параметры URL на страницу регистрации
document.addEventListener('DOMContentLoaded', function() {
    const registerLink = document.getElementById('registerLink');
    if (registerLink) {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.toString()) {
            registerLink.href = '/register?' + urlParams.toString();
        }
    }
});
</script>
{% endblock %}
