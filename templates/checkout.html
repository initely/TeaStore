{% extends "base.html" %}

{% block title %}Оформление заказа - Wanderleaf Teas{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/checkout.css">
{% endblock %}

{% block content %}
<div class="checkout-page">
    <div class="container">
        <h1>Оформление заказа</h1>
        
        <div class="checkout-layout">
            <!-- Форма доставки -->
            <div class="checkout-form-section">
                <h2>Данные доставки</h2>
                <form id="checkoutForm" class="checkout-form">
                    <div class="form-group">
                        <label for="deliveryCity">Город *</label>
                        <input type="text" id="deliveryCity" name="delivery_city" required 
                               value="{{ user.city if user and user.city else '' }}">
                    </div>
                    
                    <div class="form-group">
                        <label for="deliveryAddress">Адрес доставки *</label>
                        <textarea id="deliveryAddress" name="delivery_address" rows="3" required
                                  placeholder="Улица, дом, квартира">{{ user.address if user and user.address else '' }}</textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="deliveryPostalCode">Почтовый индекс</label>
                        <input type="text" id="deliveryPostalCode" name="delivery_postal_code"
                               value="{{ user.postal_code if user and user.postal_code else '' }}">
                    </div>
                    
                    <div class="form-group">
                        <label for="deliveryPhone">Телефон *</label>
                        <input type="tel" id="deliveryPhone" name="delivery_phone" required
                               value="{{ user.phone if user and user.phone else '' }}">
                    </div>
                    
                    <div class="form-group">
                        <label for="notes">Комментарий к заказу</label>
                        <textarea id="notes" name="notes" rows="3" 
                                  placeholder="Дополнительные пожелания по доставке"></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-large">Оформить заказ</button>
                </form>
            </div>
            
            <!-- Итоговая информация -->
            <div class="checkout-summary-section">
                <h2>Ваш заказ</h2>
                <div id="orderSummary" class="order-summary">
                    <div class="loading">Загрузка...</div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/js/checkout.js?v=20260324"></script>
{% endblock %}
